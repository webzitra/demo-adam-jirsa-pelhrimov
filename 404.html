<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stránka nenalezena — Adam Jirsa</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 1.5rem;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 480px;
      position: relative;
      z-index: 1;
    }

    .error-code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #56C8E0, #3ba8c0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      letter-spacing: -0.04em;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #fff;
    }

    p {
      color: #888;
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 2rem;
      background: linear-gradient(135deg, #56C8E0, #3ba8c0);
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      text-decoration: none;
      border-radius: 999px;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(86, 200, 224, 0.35);
    }

    .links {
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      color: #56C8E0;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }

    .links a:hover {
      opacity: 0.7;
    }

    .bg-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: rgba(86, 200, 224, 0.06);
      filter: blur(100px);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="container">
    <span class="emoji">🏋️</span>
    <div class="error-code">404</div>
    <h1>Tuhle stránku jsem nenatrénoval</h1>
    <p>Vypadá to, že stránka, kterou hledáš, neexistuje nebo byla přesunuta. Nevadí — vrať se zpět a pokračuj dál!</p>
    <a href="/" class="btn">← Zpět na úvod</a>
    <div class="links">
      <a href="/#sluzby">Služby</a>
      <a href="/#kontakt">Kontakt</a>
      <a href="/online-koucink/">Online koučink</a>
    </div>
  </div>
</body>
</html>
